<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 560" width="280" height="560">
  <!-- Phone frame -->
  <rect width="280" height="560" rx="28" fill="#1a1a2e"/>
  <!-- Status bar -->
  <rect x="0" y="0" width="280" height="36" rx="28" fill="#1a1a2e"/>
  <rect x="0" y="20" width="280" height="16" fill="#1a1a2e"/>
  <text x="24" y="28" font-family="Arial" font-size="10" fill="#fff" opacity="0.7">9:41</text>
  <text x="230" y="28" font-family="Arial" font-size="10" fill="#fff" opacity="0.7">●●● WiFi</text>
  <!-- App bar -->
  <rect x="0" y="36" width="280" height="52" fill="#2563eb"/>
  <text x="24" y="68" font-family="Arial" font-weight="bold" font-size="18" fill="#fff">CrossShare</text>
  <!-- Content area -->
  <rect x="0" y="88" width="280" height="472" fill="#f8fafc"/>
  <!-- Connected chip -->
  <rect x="20" y="104" width="240" height="36" rx="18" fill="#dcfce7"/>
  <circle cx="40" cy="122" r="6" fill="#16a34a"/>
  <text x="52" y="127" font-family="Arial" font-size="12" fill="#15803d" font-weight="bold">Win-PC に接続中</text>
  <!-- Section label -->
  <text x="20" y="164" font-family="Arial" font-size="11" fill="#64748b" font-weight="bold">ペアリング済みデバイス</text>
  <!-- Device card -->
  <rect x="20" y="174" width="240" height="68" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="36" y="190" width="36" height="36" rx="8" fill="#eff6ff"/>
  <text x="48" y="214" font-family="Arial" font-size="18" text-anchor="middle">🪟</text>
  <text x="84" y="205" font-family="Arial" font-size="13" fill="#1e293b" font-weight="bold">Windows-PC</text>
  <text x="84" y="222" font-family="Arial" font-size="11" fill="#64748b">192.168.1.5 · 接続中</text>
  <circle cx="236" cy="208" r="5" fill="#22c55e"/>
  <!-- Add device button -->
  <rect x="20" y="258" width="240" height="52" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="140" y="278" font-family="Arial" font-size="18" text-anchor="middle" fill="#2563eb">＋</text>
  <text x="140" y="296" font-family="Arial" font-size="11" text-anchor="middle" fill="#64748b">デバイスを追加</text>
  <!-- QR section -->
  <text x="20" y="336" font-family="Arial" font-size="11" fill="#64748b" font-weight="bold">QR コードでペアリング</text>
  <rect x="70" y="346" width="140" height="140" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <!-- QR code mock -->
  <rect x="82" y="358" width="116" height="116" rx="4" fill="#fff"/>
  <!-- QR corner marks -->
  <rect x="86" y="362" width="30" height="30" rx="3" fill="none" stroke="#1e293b" stroke-width="3"/>
  <rect x="90" y="366" width="22" height="22" rx="1" fill="#1e293b"/>
  <rect x="165" y="362" width="30" height="30" rx="3" fill="none" stroke="#1e293b" stroke-width="3"/>
  <rect x="169" y="366" width="22" height="22" rx="1" fill="#1e293b"/>
  <rect x="86" y="440" width="30" height="30" rx="3" fill="none" stroke="#1e293b" stroke-width="3"/>
  <rect x="90" y="444" width="22" height="22" rx="1" fill="#1e293b"/>
  <!-- QR dots -->
  <rect x="124" y="362" width="6" height="6" fill="#1e293b" rx="1"/>
  <rect x="134" y="362" width="6" height="6" fill="#1e293b" rx="1"/>
  <rect x="144" y="362" width="6" height="6" fill="#1e293b" rx="1"/>
  <rect x="124" y="373" width="6" height="6" fill="#1e293b" rx="1"/>
  <rect x="134" y="384" width="6" height="6" fill="#1e293b" rx="1"/>
  <rect x="144" y="373" width="6" height="6" fill="#1e293b" rx="1"/>
  <rect x="124" y="395" width="6" height="6" fill="#1e293b" rx="1"/>
  <rect x="134" y="406" width="6" height="6" fill="#1e293b" rx="1"/>
  <rect x="124" y="417" width="6" height="6" fill="#1e293b" rx="1"/>
  <rect x="144" y="395" width="6" height="6" fill="#1e293b" rx="1"/>
  <rect x="165" y="395" width="6" height="6" fill="#1e293b" rx="1"/>
  <rect x="124" y="440" width="6" height="6" fill="#1e293b" rx="1"/>
  <rect x="134" y="440" width="6" height="6" fill="#1e293b" rx="1"/>
  <rect x="144" y="440" width="6" height="6" fill="#1e293b" rx="1"/>
  <text x="140" y="502" font-family="Arial" font-size="11" text-anchor="middle" fill="#64748b">Windows アプリでスキャン</text>
  <!-- Bottom nav -->
  <rect x="0" y="506" width="280" height="54" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="46" y="530" font-family="Arial" font-size="18" text-anchor="middle">🏠</text>
  <text x="46" y="545" font-family="Arial" font-size="9" text-anchor="middle" fill="#2563eb">ホーム</text>
  <text x="140" y="530" font-family="Arial" font-size="18" text-anchor="middle">📋</text>
  <text x="140" y="545" font-family="Arial" font-size="9" text-anchor="middle" fill="#64748b">クリップボード</text>
  <text x="234" y="530" font-family="Arial" font-size="18" text-anchor="middle">⚙️</text>
  <text x="234" y="545" font-family="Arial" font-size="9" text-anchor="middle" fill="#64748b">設定</text>
</svg>
