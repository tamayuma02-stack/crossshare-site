<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 560" width="280" height="560">
  <!-- Phone frame -->
  <rect width="280" height="560" rx="28" fill="#1a1a2e"/>
  <rect x="0" y="20" width="280" height="16" fill="#1a1a2e"/>
  <text x="24" y="28" font-family="Arial" font-size="10" fill="#fff" opacity="0.7">9:41</text>
  <text x="230" y="28" font-family="Arial" font-size="10" fill="#fff" opacity="0.7">●●● WiFi</text>
  <!-- App bar -->
  <rect x="0" y="36" width="280" height="52" fill="#2563eb"/>
  <text x="24" y="62" font-family="Arial" font-weight="bold" font-size="16" fill="#fff">クリップボード</text>
  <rect x="220" y="48" width="44" height="26" rx="13" fill="rgba(255,255,255,0.2)"/>
  <text x="242" y="66" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">自動ON</text>
  <!-- Content -->
  <rect x="0" y="88" width="280" height="472" fill="#f8fafc"/>
  <!-- Sync status banner -->
  <rect x="12" y="100" width="256" height="34" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="28" y="122" font-family="Arial" font-size="12" fill="#2563eb">⚡ Win-PC と自動同期中</text>
  <!-- History label -->
  <text x="20" y="156" font-family="Arial" font-size="11" fill="#64748b" font-weight="bold">最近のクリップボード</text>
  <!-- Item 1 - highlighted (just synced) -->
  <rect x="12" y="164" width="256" height="72" rx="10" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="12" y="164" width="256" height="72" rx="10" fill="rgba(37,99,235,0.04)"/>
  <text x="24" y="183" font-family="Arial" font-size="10" fill="#2563eb" font-weight="bold">📋 たった今 → PC に送信済み</text>
  <text x="24" y="200" font-family="Arial" font-size="13" fill="#1e293b">会議の議事録はDropboxの</text>
  <text x="24" y="216" font-family="Arial" font-size="13" fill="#1e293b">shared/2026フォルダに保存</text>
  <text x="24" y="230" font-family="Arial" font-size="10" fill="#94a3b8">9:41</text>
  <text x="244" y="215" font-family="Arial" font-size="16" fill="#22c55e" text-anchor="middle">✓</text>
  <!-- Item 2 -->
  <rect x="12" y="244" width="256" height="60" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="24" y="263" font-family="Arial" font-size="10" fill="#64748b">5分前</text>
  <text x="24" y="280" font-family="Arial" font-size="13" fill="#1e293b">https://example.com/docs/...</text>
  <text x="24" y="296" font-family="Arial" font-size="10" fill="#94a3b8">URL</text>
  <!-- Item 3 -->
  <rect x="12" y="312" width="256" height="60" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="24" y="331" font-family="Arial" font-size="10" fill="#64748b">12分前</text>
  <text x="24" y="348" font-family="Arial" font-size="13" fill="#1e293b">山田太郎 / 080-xxxx-xxxx</text>
  <text x="24" y="364" font-family="Arial" font-size="10" fill="#94a3b8">テキスト</text>
  <!-- Item 4 -->
  <rect x="12" y="380" width="256" height="60" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="24" y="399" font-family="Arial" font-size="10" fill="#64748b">1時間前</text>
  <text x="24" y="416" font-family="Arial" font-size="13" fill="#1e293b">スプリント計画 2026-Q3</text>
  <text x="24" y="432" font-family="Arial" font-size="10" fill="#94a3b8">テキスト</text>
  <!-- Premium badge -->
  <rect x="12" y="456" width="256" height="36" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="140" y="479" font-family="Arial" font-size="11" fill="#92400e" text-anchor="middle">⭐ プレミアム: 履歴 無制限 · 自動同期 ON</text>
  <!-- Bottom nav -->
  <rect x="0" y="506" width="280" height="54" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="46" y="530" font-family="Arial" font-size="18" text-anchor="middle">🏠</text>
  <text x="46" y="545" font-family="Arial" font-size="9" text-anchor="middle" fill="#64748b">ホーム</text>
  <text x="140" y="530" font-family="Arial" font-size="18" text-anchor="middle">📋</text>
  <text x="140" y="545" font-family="Arial" font-size="9" text-anchor="middle" fill="#2563eb">クリップボード</text>
  <text x="234" y="530" font-family="Arial" font-size="18" text-anchor="middle">⚙️</text>
  <text x="234" y="545" font-family="Arial" font-size="9" text-anchor="middle" fill="#64748b">設定</text>
</svg>
