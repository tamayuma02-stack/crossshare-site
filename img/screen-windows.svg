<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <!-- Window frame -->
  <rect width="480" height="320" rx="10" fill="#1e293b"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="480" height="36" rx="10" fill="#0f172a"/>
  <rect x="0" y="18" width="480" height="18" fill="#0f172a"/>
  <!-- Title bar controls -->
  <circle cx="18" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="18" r="6" fill="#febc2e"/>
  <circle cx="58" cy="18" r="6" fill="#28c840"/>
  <text x="240" y="23" font-family="Arial" font-size="12" fill="#94a3b8" text-anchor="middle">CrossShare</text>
  <!-- Sidebar -->
  <rect x="0" y="36" width="180" height="284" fill="#0f172a"/>
  <!-- App logo area -->
  <rect x="16" y="52" width="148" height="52" rx="8" fill="rgba(37,99,235,0.2)"/>
  <text x="90" y="74" font-family="Arial" font-size="22" text-anchor="middle">🔗</text>
  <text x="90" y="92" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">CrossShare</text>
  <!-- Sidebar nav -->
  <rect x="16" y="116" width="148" height="34" rx="6" fill="rgba(37,99,235,0.3)"/>
  <text x="32" y="139" font-family="Arial" font-size="13">🏠</text>
  <text x="52" y="139" font-family="Arial" font-size="13" fill="#fff">ホーム</text>
  <text x="32" y="173" font-family="Arial" font-size="13">📋</text>
  <text x="52" y="173" font-family="Arial" font-size="13" fill="#94a3b8">クリップボード</text>
  <text x="32" y="207" font-family="Arial" font-size="13">📁</text>
  <text x="52" y="207" font-family="Arial" font-size="13" fill="#94a3b8">ファイル</text>
  <text x="32" y="241" font-family="Arial" font-size="13">⚙️</text>
  <text x="52" y="241" font-family="Arial" font-size="13" fill="#94a3b8">設定</text>
  <!-- Main content -->
  <rect x="180" y="36" width="300" height="284" fill="#1e293b"/>
  <!-- Connected status -->
  <rect x="196" y="52" width="268" height="44" rx="8" fill="#052e16"/>
  <circle cx="214" cy="74" r="6" fill="#22c55e"/>
  <text x="228" y="71" font-family="Arial" font-size="12" fill="#fff" font-weight="bold">Android に接続中</text>
  <text x="228" y="88" font-family="Arial" font-size="10" fill="#86efac">Pixel 8 · プレミアム有効 ✓</text>
  <!-- File receive notification - highlighted -->
  <rect x="196" y="106" width="268" height="80" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1.5"/>
  <text x="212" y="124" font-family="Arial" font-size="10" fill="#60a5fa">📥 ファイルを受信しました</text>
  <rect x="212" y="132" width="36" height="36" rx="4" fill="#2563eb"/>
  <text x="230" y="156" font-family="Arial" font-size="16" text-anchor="middle">📄</text>
  <text x="256" y="146" font-family="Arial" font-size="12" fill="#fff" font-weight="bold">議事録_2026Q3.pdf</text>
  <text x="256" y="162" font-family="Arial" font-size="10" fill="#94a3b8">2.4 MB · Pixel 8 から</text>
  <text x="430" y="175" font-family="Arial" font-size="10" fill="#2563eb" text-anchor="end">開く</text>
  <!-- Clipboard area -->
  <text x="212" y="208" font-family="Arial" font-size="11" fill="#94a3b8" font-weight="bold">クリップボード (自動同期中)</text>
  <rect x="196" y="216" width="268" height="52" rx="8" fill="#0f172a"/>
  <text x="212" y="234" font-family="Arial" font-size="10" fill="#60a5fa">📋 スマホからコピーされました · たった今</text>
  <text x="212" y="252" font-family="Arial" font-size="12" fill="#e2e8f0">会議の議事録はDropboxの shared/...</text>
  <!-- Send file button -->
  <rect x="196" y="280" width="130" height="28" rx="6" fill="#2563eb"/>
  <text x="261" y="299" font-family="Arial" font-size="11" fill="#fff" text-anchor="middle">📤 ファイルを送る</text>
  <rect x="334" y="280" width="130" height="28" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="399" y="299" font-family="Arial" font-size="11" fill="#94a3b8" text-anchor="middle">📋 クリップボード送信</text>
</svg>
